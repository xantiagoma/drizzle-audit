name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: bun install

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        # Covers: PG integration (PGlite, in-memory), SQLite integration (better-sqlite3, in-memory),
        # and schema/unit tests for MySQL. No live MySQL binary is downloaded in CI because
        # mysql-memory-server is only used in examples/ which are excluded from the test suite.
        run: bun run test

      - name: Build
        run: bun run build
